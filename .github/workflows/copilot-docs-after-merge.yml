# After each push to `main`, opens an issue with a merge summary and assigns
# GitHub Copilot cloud agent so it can open a documentation PR.
#
# Prerequisites:
# - Copilot cloud agent enabled for this repository (see GitHub Copilot settings).
# - Repository secret `COPILOT_ASSIGNMENT_TOKEN`: a fine-grained or classic PAT
#   belonging to a user who may assign issues to Copilot. The default
#   `GITHUB_TOKEN` cannot assign the Copilot agent. See:
#   https://docs.github.com/en/copilot/using-github-copilot/coding-agent/using-copilot-to-work-on-an-issue
#
# Skips: missing secret, actor is Copilot or Dependabot, or commit message contains [skip-docs].

name: Copilot docs task after merge

on:
  push:
    branches: [main]
    # Optional: only when these paths change (reduces issue noise)
    # paths:
    #   - 'farm/**'
    #   - 'scripts/**'

permissions:
  contents: read

jobs:
  assign-docs-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Decide whether to run
        id: meta
        env:
          ACTOR: ${{ github.actor }}
          HAS_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN != '' }}
        run: |
          SKIP=false
          if [ "$HAS_TOKEN" != "true" ]; then
            SKIP=true
            echo "::notice::COPILOT_ASSIGNMENT_TOKEN is not set; skipping."
          fi
          if [ "$ACTOR" = 'copilot-swe-agent[bot]' ] || [ "$ACTOR" = 'dependabot[bot]' ]; then
            SKIP=true
            echo "Skipping: actor is ${ACTOR}."
          fi
          MSG=$(git log -1 --pretty=%B 2>/dev/null || true)
          if echo "$MSG" | grep -qiF '[skip-docs]'; then
            SKIP=true
            echo "Skipping: [skip-docs] in commit message."
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Build change summary
        id: summary
        if: steps.meta.outputs.skip != 'true'
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          SERVER: ${{ github.server_url }}
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            STAT=$(git diff HEAD~1..HEAD --stat || true)
            NAMES=$(git diff HEAD~1..HEAD --name-only || true)
          else
            STAT="(no parent commit; initial or shallow history)"
            NAMES=$(git ls-files || true)
          fi
          {
            echo "## Merge summary (autogenerated)"
            echo
            echo "**Commit:** [\`${SHA:0:7}\`](${SERVER}/${REPO}/commit/${SHA})"
            echo
            echo "### Files touched"
            echo '```'
            echo "$NAMES"
            echo '```'
            echo
            echo "### Diff stat"
            echo '```'
            echo "$STAT"
            echo '```'
            echo
            echo "### Request"
            echo "Update user-facing documentation so it matches the behavior and APIs implied by these changes."
            echo "Limit edits to documentation (e.g. \`README.md\`, \`CONTRIBUTING.md\`, \`AGENTS.md\`, \`docs/\`)."
            echo "Open a **pull request** against \`main\`; do not merge directly."
          } > "$RUNNER_TEMP/issue-body.md"
          echo "path=$RUNNER_TEMP/issue-body.md" >> "$GITHUB_OUTPUT"

      - name: Create issue and assign Copilot
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          TITLE="Docs sync after merge ${SHA_SHORT:0:7}"
          BODY=$(cat "${{ steps.summary.outputs.path }}")
          CUSTOM="Follow the issue body. Propose doc updates only (README, CONTRIBUTING, AGENTS.md, docs/). Open a PR to main."

          jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg repo "$REPO_FULL" \
            --arg instructions "$CUSTOM" \
            '{
              title: $title,
              body: $body,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: $instructions,
                custom_agent: "",
                model: ""
              }
            }' | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO_FULL}/issues" \
              --input -
