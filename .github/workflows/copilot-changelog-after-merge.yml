name: Copilot changelog task after merge

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  assign-changelog-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to run
        id: meta
        env:
          ACTOR: ${{ github.actor }}
          HAS_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN != '' }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          SKIP=false

          if [ "$HAS_TOKEN" != "true" ]; then
            SKIP=true
            echo "::notice::COPILOT_ASSIGNMENT_TOKEN is not set; skipping."
          fi

          if [ "$ACTOR" = "copilot-swe-agent[bot]" ] || [ "$ACTOR" = "dependabot[bot]" ]; then
            SKIP=true
            echo "Skipping: actor is ${ACTOR}."
          fi

          MSG=$(git log -1 --pretty=%B 2>/dev/null || true)
          if echo "$MSG" | grep -qiF '[skip-changelog]'; then
            SKIP=true
            echo "Skipping: [skip-changelog] in commit message."
          fi

          BASE="$BEFORE"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              BASE=$(git rev-parse HEAD~1)
            else
              BASE="$SHA"
            fi
          fi

          CHANGED=$(git diff --name-only "$BASE..$SHA" || true)
          if [ -z "$CHANGED" ]; then
            SKIP=true
            echo "Skipping: no changed files in push range."
          fi

          # Avoid loops from changelog-only updates.
          NON_CHANGELOG=$(echo "$CHANGED" | grep -Ev '^(CHANGELOG.md|docs/devlog/.*)$' || true)
          if [ -z "$NON_CHANGELOG" ]; then
            SKIP=true
            echo "Skipping: push only touched changelog/devlog files."
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Build changelog task summary
        id: summary
        if: steps.meta.outputs.skip != 'true'
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BASE: ${{ steps.meta.outputs.base }}
          SERVER: ${{ github.server_url }}
        run: |
          NAMES=$(git diff --name-only "$BASE..$SHA" || true)
          STAT=$(git diff --stat "$BASE..$SHA" || true)
          COMMITS=$(git log --no-merges --pretty='- %h %s (%an)' "$BASE..$SHA" || true)

          {
            echo "## Changelog request (autogenerated)"
            echo
            echo "**Range:** [\`${BASE:0:7}\`](${SERVER}/${REPO}/commit/${BASE}) -> [\`${SHA:0:7}\`](${SERVER}/${REPO}/commit/${SHA})"
            echo
            echo "### Commits in range"
            echo '```'
            echo "$COMMITS"
            echo '```'
            echo
            echo "### Files touched"
            echo '```'
            echo "$NAMES"
            echo '```'
            echo
            echo "### Diff stat"
            echo '```'
            echo "$STAT"
            echo '```'
            echo
            echo "### Request"
            echo "Update \`CHANGELOG.md\` with a new dated entry summarizing these changes."
            echo "Write in clear release-note style with:"
            echo "- what changed"
            echo "- why it matters"
            echo "- any user/developer impact"
            echo
            echo "If appropriate, group changes by Added/Changed/Fixed/Docs/Performance."
            echo
            echo "Open a PR against \`main\`. Use commit message suffix \`[skip-changelog]\` to avoid workflow recursion."
          } > "$RUNNER_TEMP/changelog-issue-body.md"

          echo "path=$RUNNER_TEMP/changelog-issue-body.md" >> "$GITHUB_OUTPUT"

      - name: Create issue and assign Copilot
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGNMENT_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          SHA_SHORT: ${{ github.sha }}
        run: |
          TITLE="Changelog sync after merge ${SHA_SHORT:0:7}"
          BODY=$(cat "${{ steps.summary.outputs.path }}")
          CUSTOM="Update only CHANGELOG.md for this merge range. Keep wording concise and explanatory. Open a PR to main. Include [skip-changelog] in commit message."

          jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg repo "$REPO_FULL" \
            --arg instructions "$CUSTOM" \
            '{
              title: $title,
              body: $body,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: "main",
                custom_instructions: $instructions,
                custom_agent: "",
                model: ""
              }
            }' | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO_FULL}/issues" \
              --input -
