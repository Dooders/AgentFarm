name: Evolution Regression

# Run threshold-based regression checks for the evolution optimizer.
# Triggered on every push and pull_request to main, but the job is path-
# scoped so it only runs when evolution-related files actually change.
#
# Developers can run the same checks locally:
#   pytest -v -m evolution_regression tests/runners/test_evolution_regression.py

on:
  push:
    branches: [main]
    paths:
      - 'farm/runners/evolution_experiment.py'
      - 'farm/runners/adaptive_mutation.py'
      - 'farm/core/simulation.py'
      - 'farm/core/hyperparameter_chromosome.py'
      - 'farm/core/genome.py'
      - 'tests/runners/test_evolution_regression.py'
      - '.github/workflows/evolution-regression.yml'
      - 'pytest.ini'
  pull_request:
    branches: [main]
    paths:
      - 'farm/runners/evolution_experiment.py'
      - 'farm/runners/adaptive_mutation.py'
      - 'farm/core/simulation.py'
      - 'farm/core/hyperparameter_chromosome.py'
      - 'farm/core/genome.py'
      - 'tests/runners/test_evolution_regression.py'
      - '.github/workflows/evolution-regression.yml'
      - 'pytest.ini'
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  evolution-regression:
    name: Evolution optimizer regression checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run evolution regression suite
        run: |
          pytest -v -o addopts='' -m "evolution_regression and not slow and not integration" \
            tests/runners/test_evolution_regression.py \
            --tb=short
