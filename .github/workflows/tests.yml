name: tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install package
        run: |
          pip install -e .
      - name: Run pytest
        run: |
          pytest -q -vv --durations=50 --ignore=tests/test_deterministic_pytest.py -m "not slow and not integration" --cov=farm --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=90
      - name: Run integration and determinism smoke tests
        run: |
          pytest -q -vv --durations=20 tests/test_simulation_determinism_regression.py::test_simulation_repeatability_fixed_seed tests/test_simulation_id.py::TestSimulationID::test_simulation_id_generation

  js-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: farm/editor
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Cache npm dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('farm/editor/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install
        run: npm ci || npm install --no-audit --no-fund
      - name: Run Jest
        run: npm test -- --runInBand
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
      - name: Install Ruff
        run: pip install ruff==0.15.18
      - name: Run Ruff
        run: ruff check . --output-format=github

  docs-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
      - name: Check internal documentation links
        run: python scripts/check_docs_links.py

  docs-external-links:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check external links (lychee)
        uses: lycheeorg/github-action@v2
        with:
          args: --config .lychee.toml --no-progress docs README.md AGENTS.md CONTRIBUTING.md

